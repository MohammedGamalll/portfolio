<nav
    class="capitalize fixed w-full z-20 top-0 start-0 border-b bg-white/80 dark:bg-bg-mid-dark/80 backdrop-blur-md border-gray-200 dark:border-gray-600 px-4 sm:px-6 lg:px-10">
    <div
        class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto py-3">

        <!-- Logo -->
        <a routerLink="/"
            class="flex items-center shrink-0">
            <span
                class="text-xl sm:text-2xl typography font-light whitespace-nowrap dark:text-white text-black">Mohammed</span>
        </a>

        <!-- Right side: theme toggle + hamburger -->
        <div class="flex items-center gap-3 lg:order-1">

            <!-- Theme Toggle Button -->
            <button (click)="toggleTheme()"
                class="text-xl rounded cursor-pointer p-1">
                @if (isDarkModeEnabled()) {
                <i
                    class="fas fa-moon text-white hover:text-hover transition-colors"></i>
                } @else {
                <i
                    class="fas fa-sun text-black hover:text-hover transition-colors"></i>
                }
            </button>

            <!-- Mobile Menu Button (visible below lg) -->
            <button (click)="toggleNavbar()"
                class="inline-flex items-center justify-center p-2 w-10 h-10 text-sm rounded-lg lg:hidden border border-gray-300 dark:border-gray-500 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 focus:outline-none cursor-pointer"
                aria-controls="navbar-sticky" [attr.aria-expanded]="isNavbarOpen">
                <span class="sr-only">Open main menu</span>
                @if (isNavbarOpen) {
                <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1 1l12 12M13 1L1 13" />
                </svg>
                } @else {
                <svg class="w-5 h-5" aria-hidden="true"
                    xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 17 14">
                    <path stroke="currentColor" stroke-linecap="round"
                        stroke-linejoin="round" stroke-width="2"
                        d="M1 1h15M1 7h15M1 13h15" />
                </svg>
                }
            </button>
        </div>

        <!-- Navbar Menu (full-width below header on mobile, inline on desktop) -->
        <div [class.hidden]="!isNavbarOpen"
            class="w-full lg:flex lg:items-center lg:w-auto "
            id="navbar-sticky">
            <ul
                class="flex flex-col gap-2 py-4 px-2 mt-3 font-medium border border-gray-200 dark:border-gray-700 rounded-lg lg:flex-row lg:items-center lg:gap-1 xl:gap-4 lg:p-0 lg:mt-0 lg:border-0">
                <li>
                    <a (click)="closeNavbar()" routerLink="/home"
                        routerLinkActive="!bg-gray !text-white"
                        class="block py-2 px-4 lg:py-1 lg:px-3 text-sm text-black dark:text-white rounded-lg hover:bg-gray transition-colors"
                        aria-current="page">Home</a>
                </li>
                <li>
                    <a (click)="closeNavbar()" routerLink="/about"
                        routerLinkActive="!bg-gray !text-white"
                        class="block py-2 px-4 lg:py-1 lg:px-3 text-sm text-black dark:text-white rounded-lg hover:bg-gray transition-colors"
                        aria-current="page">About</a>
                </li>
                <li>
                    <a (click)="closeNavbar()" routerLink="/experience"
                        routerLinkActive="!bg-gray !text-white"
                        class="block py-2 px-4 lg:py-1 lg:px-3 text-sm text-black dark:text-white rounded-lg hover:bg-gray transition-colors"
                        aria-current="page">Experience</a>
                </li>
                <li>
                    <a (click)="closeNavbar()" routerLink="/projects"
                        routerLinkActive="!bg-gray !text-white"
                        class="block py-2 px-4 lg:py-1 lg:px-3 text-sm text-black dark:text-white rounded-lg hover:bg-gray transition-colors"
                        aria-current="page">Projects</a>
                </li>
                <li>
                    <a (click)="closeNavbar()" routerLink="/services"
                        routerLinkActive="!bg-gray !text-white"
                        class="block py-2 px-4 lg:py-1 lg:px-3 text-sm text-black dark:text-white rounded-lg hover:bg-gray transition-colors"
                        aria-current="page">Services</a>
                </li>
                <li>
                    <a (click)="closeNavbar()" routerLink="/skills"
                        routerLinkActive="!bg-gray !text-white"
                        class="block py-2 px-4 lg:py-1 lg:px-3 text-sm text-black dark:text-white rounded-lg hover:bg-gray transition-colors"
                        aria-current="page">Skills</a>
                </li>
                <li>
                    <a (click)="closeNavbar()" routerLink="/contact"
                        routerLinkActive="!bg-gray !text-white"
                        class="block py-2 px-4 lg:py-1 lg:px-3 text-sm text-black dark:text-white rounded-lg hover:bg-gray transition-colors"
                        aria-current="page">Contact</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
